<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI 对话</title>
  <style>
    :root {
      --bg: #f7f7fa;
      --surface: #ffffff;
      --surface2: #f0f0f5;
      --text: #1c1c1e;
      --text-secondary: #6e6e73;
      --border: #e5e5ea;
      --accent: #007aff;
      --accent-hover: #0056cc;
      --user-bubble: #007aff;
      --user-text: #ffffff;
      --ai-bubble: #ffffff;
      --ai-text: #1c1c1e;
      --ai-border: #e5e5ea;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 20px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --surface: #2c2c2e;
        --surface2: #3a3a3c;
        --text: #f5f5f7;
        --text-secondary: #a1a1a6;
        --border: #3a3a3c;
        --accent: #0a84ff;
        --accent-hover: #409cff;
        --user-bubble: #0a84ff;
        --user-text: #ffffff;
        --ai-bubble: #2c2c2e;
        --ai-text: #f5f5f7;
        --ai-border: #3a3a3c;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* 顶部栏 - 无文字，仅图标 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 8px 16px;
      gap: 8px;
      flex-shrink: 0;
      min-height: 44px;
      background: transparent;
      position: relative;
      z-index: 10;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all var(--transition);
      position: relative;
    }
    .icon-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .icon-btn:active {
      transform: scale(0.93);
    }
    .icon-btn svg {
      width: 20px;
      height: 20px;
    }

    /* 历史记录面板 (右侧抽屉) */
    .history-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 320px;
      max-width: 85vw;
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      z-index: 30;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 1px solid var(--border);
    }
    .history-panel.visible {
      transform: translateX(0);
    }
    .history-panel-header {
      padding: 16px 20px;
      font-weight: 600;
      font-size: 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-panel-header button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .history-panel-header button:hover {
      background: var(--surface2);
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .history-item {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-bottom: 4px;
      transition: background var(--transition);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .history-item:hover {
      background: var(--surface2);
    }
    .history-item .role {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .history-item .content {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
      opacity: 0.85;
    }
    .history-item .time {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .history-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 14px;
      padding: 40px 20px;
      text-align: center;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 25;
      display: none;
      transition: opacity 0.2s;
    }
    .overlay.visible {
      display: block;
    }

    /* 聊天区域 */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .chat-container::-webkit-scrollbar {
      width: 4px;
    }
    .chat-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .empty-state .logo-icon svg {
      width: 28px;
      height: 28px;
    }
    .empty-state .subtitle {
      font-size: 13px;
      opacity: 0.7;
      max-width: 280px;
      line-height: 1.5;
    }

    /* 消息气泡 */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }
    .message.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }
    .message .bubble {
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 6px;
    }
    .message.assistant .bubble {
      background: var(--ai-bubble);
      color: var(--ai-text);
      border: 1px solid var(--ai-border);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-sm);
    }
    .message .model-tag {
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      padding: 0 4px;
      opacity: 0.7;
      font-weight: 500;
    }
    .message.user .model-tag {
      text-align: right;
    }

    /* Markdown 内样式 */
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }
    .bubble code {
      background: rgba(0,0,0,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.88em;
    }
    .message.user .bubble code {
      background: rgba(255,255,255,0.2);
    }
    .bubble pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 10px 0;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
    }
    .bubble pre code {
      background: none;
      padding: 0;
      font-size: inherit;
      color: inherit;
    }
    .code-block-wrapper {
      position: relative;
      margin: 10px 0;
    }
    .copy-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #cdd6f4;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      transition: all var(--transition);
    }
    .copy-btn:hover { background: rgba(255,255,255,0.25); }
    .copy-btn.copied { background: #30d158; color: #fff; }

    .bubble ul, .bubble ol { margin: 6px 0; padding-left: 20px; }
    .bubble li { margin: 3px 0; }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      margin: 8px 0;
      padding: 4px 12px;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.03);
      border-radius: 0 6px 6px 0;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* 底部栏 */
    .bottom-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 5;
    }

    .model-switch-wrapper {
      position: relative;
      flex-shrink: 0;
    }
    .btn-model-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      border-radius: 25px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: all var(--transition);
      white-space: nowrap;
      min-height: 44px;
    }
    .btn-model-switch:hover {
      background: var(--surface);
      border-color: var(--accent);
    }
    .btn-model-switch:active { transform: scale(0.96); }
    .provider-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .provider-dot.qwen { background: #6366f1; }
    .provider-dot.zhipu { background: #10b981; }
    .chevron {
      width: 16px;
      height: 16px;
      transition: transform var(--transition);
      color: var(--text-secondary);
    }
    .chevron.open { transform: rotate(180deg); }

    .model-dropdown {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      min-width: 200px;
      display: none;
      flex-direction: column;
      z-index: 30;
      overflow: hidden;
      animation: dropdownIn 0.2s ease;
      transform-origin: bottom left;
    }
    .model-dropdown.visible { display: flex; }
    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(6px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .dropdown-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      transition: background var(--transition);
    }
    .dropdown-item:hover { background: var(--surface2); }
    .dropdown-item.active { background: rgba(0,122,255,0.1); font-weight: 600; color: var(--accent); }
    .dropdown-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dropdown-item .dot.qwen { background: #6366f1; }
    .dropdown-item .dot.zhipu { background: #10b981; }

    .input-wrapper {
      flex: 1;
      min-width: 0;
    }
    .input-wrapper textarea {
      width: 100%;
      padding: 11px 16px;
      border-radius: 25px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: all var(--transition);
      line-height: 1.4;
      max-height: 140px;
      min-height: 44px;
    }
    .input-wrapper textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
      background: var(--surface);
    }
    .input-wrapper textarea::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
    }
    .btn-send:hover { background: var(--accent-hover); }
    .btn-send:active { transform: scale(0.92); }
    .btn-send:disabled { background: #c7c7cc; box-shadow: none; cursor: not-allowed; }
    .btn-send svg { width: 18px; height: 18px; margin-left: 2px; }
    .btn-send .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-send.loading .spinner { display: block; }
    .btn-send.loading .send-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: #1c1c1e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 100;
      pointer-events: none;
      transition: transform 0.3s ease;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ff3b30; }

    @media (max-width: 600px) {
      .bottom-bar { gap: 6px; padding: 10px 10px; }
      .btn-model-switch { padding: 10px 12px; font-size: 13px; gap: 4px; }
      .input-wrapper textarea { padding: 10px 14px; font-size: 14px; min-height: 40px; }
      .btn-send { width: 40px; height: 40px; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>
  <!-- 顶部栏：左侧新对话按钮，右侧历史记录按钮 -->
  <div class="top-bar">
    <button class="icon-btn" id="btnNewChat" title="新对话" style="margin-right: auto;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
    <button class="icon-btn" id="btnHistory" title="历史记录">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    </button>
  </div>

  <!-- 历史记录侧边面板 -->
  <div class="history-panel" id="historyPanel">
    <div class="history-panel-header">
      <span>历史</span>
      <button id="btnCloseHistory">✕</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">暂无对话记录</div>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>

  <!-- 聊天区域 -->
  <div class="chat-container" id="chatContainer">
    <div class="empty-state" id="emptyState">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12a4 4 0 0 1 8 0"></path>
          <line x1="12" y1="8" x2="12" y2="16"></line>
        </svg>
      </div>
      <div class="subtitle">选择模型并开始对话<br>骂人 · 快速 | 聊骚 · 快速</div>
    </div>
  </div>

  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <div class="model-switch-wrapper" id="modelSwitchWrapper">
      <button class="btn-model-switch" id="btnModelSwitch">
        <span class="provider-dot qwen" id="providerDot"></span>
        <span id="modelName">骂人</span>
        <svg class="chevron" id="chevronIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="model-dropdown" id="modelDropdown">
        <div class="dropdown-item active" data-provider="qwen" data-model="qwen-plus" data-display="骂人">
          <span class="dot qwen"></span> 骂人 <span style="font-size:11px;opacity:0.7;margin-left:auto;">快速</span>
        </div>
        <div class="dropdown-item" data-provider="zhipu" data-model="glm-4-flash" data-display="聊骚">
          <span class="dot zhipu"></span> 聊骚 <span style="font-size:11px;opacity:0.7;margin-left:auto;">快速</span>
        </div>
      </div>
    </div>

    <div class="input-wrapper">
      <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
    </div>

    <button class="btn-send" id="btnSend" title="发送 (Enter)">
      <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
      </svg>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // ========== 请在此处填写您的API密钥 ==========
      const QWEN_API_KEY = 'sk-d8a36fba6e66438fb5428382d4c563dc';      // 👈 填入骂人API密钥
      const ZHIPU_API_KEY = '4361b676e870492bb24ac29059ac692e.RBHOHTX6OUaIf0tM';       // 👈 填入聊骚 API密钥
      // =============================================

      // DOM 元素
      const chatContainer = document.getElementById('chatContainer');
      const emptyState = document.getElementById('emptyState');
      const userInput = document.getElementById('userInput');
      const btnSend = document.getElementById('btnSend');
      const btnModelSwitch = document.getElementById('btnModelSwitch');
      const modelDropdown = document.getElementById('modelDropdown');
      const chevronIcon = document.getElementById('chevronIcon');
      const providerDot = document.getElementById('providerDot');
      const modelNameSpan = document.getElementById('modelName');
      const btnHistory = document.getElementById('btnHistory');
      const btnNewChat = document.getElementById('btnNewChat');
      const historyPanel = document.getElementById('historyPanel');
      const btnCloseHistory = document.getElementById('btnCloseHistory');
      const overlay = document.getElementById('overlay');
      const historyList = document.getElementById('historyList');
      const toast = document.getElementById('toast');

      // 状态
      const STORAGE_KEY = 'ai_chat_messages_v3';
      const MODEL_KEY = 'ai_chat_model_v3';
      let messages = [];
      let currentProvider = 'qwen';
      let currentModel = 'qwen-plus';
      let currentDisplay = '骂人';
      let isStreaming = false;
      let dropdownVisible = false;
      let historyVisible = false;

      // 固定人设
      const SYSTEM_PROMPTS = {
        qwen: '你是一个性格快速、热情友好的AI助手，名字叫“小千”。你的语气活泼、积极，喜欢用感叹号和表情符号来传递快乐。回答问题时要详细、有帮助，但始终保持阳光的心态。',
        zhipu: '你是一个性格快速、简洁干练的AI助手，名字叫“智言”。你的语气冷静、专业，避免多余的寒暄和表情符号。回答问题精准、直接，用最少的文字传达最清晰的信息。'
      };

      // 初始化
      function init() {
        loadModel();
        loadMessages();
        updateModelUI();
        updateSendButton();
        renderAllMessages();
        userInput.focus();
      }

      function loadModel() {
        try {
          const saved = localStorage.getItem(MODEL_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            currentProvider = data.provider || 'qwen';
            currentModel = data.model || 'qwen-plus';
            currentDisplay = data.display || '骂人';
          }
        } catch(e) {}
      }

      function saveModel() {
        localStorage.setItem(MODEL_KEY, JSON.stringify({
          provider: currentProvider,
          model: currentModel,
          display: currentDisplay
        }));
      }

      function loadMessages() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            messages = JSON.parse(saved);
            if (!Array.isArray(messages)) messages = [];
          }
        } catch(e) {
          messages = [];
        }
      }

      function saveMessages() {
        try {
          const toSave = messages.slice(-50);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
        } catch(e) {
          if (messages.length > 20) {
            messages = messages.slice(-20);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
          }
        }
      }

      // 新对话：清空消息并重置界面
      function startNewChat() {
        if (isStreaming) {
          showToast('请等待当前回复完成', true);
          return;
        }
        if (messages.length > 0 && !confirm('确定要开启新对话吗？当前对话将被清空。')) {
          return;
        }
        messages = [];
        saveMessages();
        // 清除聊天显示
        const existing = chatContainer.querySelectorAll('.message');
        existing.forEach(el => el.remove());
        emptyState.style.display = 'flex';
        renderHistoryList();
        userInput.focus();
        showToast('✨ 新对话已开启');
      }

      function updateModelUI() {
        providerDot.className = 'provider-dot ' + (currentProvider === 'qwen' ? 'qwen' : 'zhipu');
        modelNameSpan.textContent = currentDisplay;
        const items = modelDropdown.querySelectorAll('.dropdown-item');
        items.forEach(item => {
          const provider = item.dataset.provider;
          if (provider === currentProvider) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });
      }

      function updateSendButton() {
        if (isStreaming) {
          btnSend.disabled = true;
          return;
        }
        btnSend.disabled = !userInput.value.trim();
      }

      function renderAllMessages() {
        const existing = chatContainer.querySelectorAll('.message');
        existing.forEach(el => el.remove());
        if (messages.length === 0) {
          emptyState.style.display = 'flex';
        } else {
          emptyState.style.display = 'none';
        }
        messages.forEach((msg, idx) => {
          appendMessageBubble(msg, idx === messages.length-1 && msg.role === 'assistant');
        });
        scrollToBottom(false);
        renderHistoryList();
      }

      function appendMessageBubble(msg, isLastAssistant = false) {
        const div = document.createElement('div');
        div.className = 'message ' + msg.role;
        if (msg.role === 'assistant' && msg.model) {
          const tag = document.createElement('div');
          tag.className = 'model-tag';
          tag.textContent = msg.model;
          div.appendChild(tag);
        }
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = renderMarkdown(msg.content);
        div.appendChild(bubble);
        addCopyButtons(bubble);
        chatContainer.appendChild(div);
        emptyState.style.display = 'none';
      }

      function addCopyButtons(bubble) {
        const wrappers = bubble.querySelectorAll('.code-block-wrapper');
        wrappers.forEach(wrapper => {
          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = '复制';
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const code = wrapper.querySelector('pre')?.textContent || '';
            navigator.clipboard.writeText(code).then(() => {
              btn.textContent = '✓';
              btn.classList.add('copied');
              setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => {
              const ta = document.createElement('textarea');
              ta.value = code;
              ta.style.position = 'fixed'; ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.select();
              document.execCommand('copy');
              document.body.removeChild(ta);
              btn.textContent = '✓';
              btn.classList.add('copied');
              setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
            });
          });
          wrapper.appendChild(btn);
        });
      }

      function renderMarkdown(text) {
        if (!text) return '';
        let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
          return `<div class="code-block-wrapper"><pre><code>${code}</code></pre></div>`;
        });
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        html = html.replace(/^&gt;\s?(.*)$/gm, '<blockquote>$1</blockquote>');
        html = html.replace(/^[*-]\s+(.*)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\n\n/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        if (!html.startsWith('<')) html = '<p>' + html + '</p>';
        return html;
      }

      function scrollToBottom(smooth = true) {
        requestAnimationFrame(() => {
          chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
        });
      }

      // 历史记录面板
      function renderHistoryList() {
        historyList.innerHTML = '';
        if (messages.length === 0) {
          historyList.innerHTML = '<div class="history-empty">暂无对话记录</div>';
          return;
        }
        messages.forEach((msg, index) => {
          const item = document.createElement('div');
          item.className = 'history-item';
          const roleText = msg.role === 'user' ? 'you' : 'AI';
          const contentPreview = msg.content.length > 40 ? msg.content.substring(0,40)+'...' : msg.content;
          item.innerHTML = `<span class="role">${roleText}</span><span class="content">${contentPreview}</span>`;
          item.addEventListener('click', () => {
            const msgElements = chatContainer.querySelectorAll('.message');
            if (msgElements[index]) {
              msgElements[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            closeHistory();
          });
          historyList.appendChild(item);
        });
      }

      function openHistory() {
        historyVisible = true;
        historyPanel.classList.add('visible');
        overlay.classList.add('visible');
        renderHistoryList();
      }

      function closeHistory() {
        historyVisible = false;
        historyPanel.classList.remove('visible');
        overlay.classList.remove('visible');
      }

      btnHistory.addEventListener('click', openHistory);
      btnNewChat.addEventListener('click', startNewChat);
      btnCloseHistory.addEventListener('click', closeHistory);
      overlay.addEventListener('click', () => {
        if (historyVisible) closeHistory();
        if (dropdownVisible) closeDropdown();
      });

      // 模型切换
      function toggleDropdown() {
        dropdownVisible ? closeDropdown() : openDropdown();
      }
      function openDropdown() {
        dropdownVisible = true;
        modelDropdown.classList.add('visible');
        chevronIcon.classList.add('open');
      }
      function closeDropdown() {
        dropdownVisible = false;
        modelDropdown.classList.remove('visible');
        chevronIcon.classList.remove('open');
      }

      btnModelSwitch.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown();
      });

      modelDropdown.addEventListener('click', (e) => {
        const item = e.target.closest('.dropdown-item');
        if (!item) return;
        currentProvider = item.dataset.provider;
        currentModel = item.dataset.model;
        currentDisplay = item.dataset.display;
        updateModelUI();
        saveModel();
        closeDropdown();
        const key = currentProvider === 'qwen' ? QWEN_API_KEY : ZHIPU_API_KEY;
        if (!key || key.includes('your-') || key.includes('here')) {
          showToast('⚠️ 请先在代码中填写 ' + currentDisplay + ' 的API密钥', true);
        } else {
          showToast('已切换至 ' + currentDisplay);
        }
      });

      document.addEventListener('click', (e) => {
        if (dropdownVisible && !document.getElementById('modelSwitchWrapper').contains(e.target)) {
          closeDropdown();
        }
      });

      // 发送消息
      async function sendMessage() {
        if (isStreaming) return;
        const text = userInput.value.trim();
        if (!text) return;

        const apiKey = currentProvider === 'qwen' ? QWEN_API_KEY : ZHIPU_API_KEY;
        if (!apiKey || apiKey.includes('your-') || apiKey.includes('here')) {
          showToast('❌ 请先在代码中填写 ' + currentDisplay + ' 的API密钥', true);
          return;
        }

        const userMsg = { role: 'user', content: text };
        messages.push(userMsg);
        appendMessageBubble(userMsg);
        saveMessages();
        userInput.value = '';
        userInput.style.height = 'auto';
        updateSendButton();
        scrollToBottom(true);
        renderHistoryList();

        const aiMsg = { role: 'assistant', content: '', model: currentDisplay };
        messages.push(aiMsg);
        appendMessageBubble(aiMsg, true);
        const bubbles = chatContainer.querySelectorAll('.message.assistant .bubble');
        const targetBubble = bubbles[bubbles.length-1];
        targetBubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        scrollToBottom(true);

        isStreaming = true;
        btnSend.classList.add('loading');
        btnSend.disabled = true;
        userInput.disabled = true;

        const systemPrompt = SYSTEM_PROMPTS[currentProvider] || '';
        const contextMessages = messages.slice(0, -1).slice(-40).map(m => ({ role: m.role, content: m.content }));
        const fullMessages = [{ role: 'system', content: systemPrompt }, ...contextMessages];

        const config = currentProvider === 'qwen' ? {
          url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
          model: currentModel,
        } : {
          url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
          model: currentModel,
        };

        try {
          const response = await fetch(config.url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + apiKey,
            },
            body: JSON.stringify({
              model: config.model,
              messages: fullMessages,
              stream: false,
              max_tokens: 4096,
              temperature: 0.8,
            }),
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            let msg = '请求失败: ' + response.status;
            if (response.status === 401) msg = 'API密钥无效';
            else if (response.status === 429) msg = '请求太频繁，请稍后';
            else if (err.error?.message) msg = err.error.message;
            throw new Error(msg);
          }

          const data = await response.json();
          const reply = data.choices?.[0]?.message?.content || '（空回复）';
          aiMsg.content = reply;
          messages[messages.length-1] = aiMsg;
          targetBubble.innerHTML = renderMarkdown(reply);
          addCopyButtons(targetBubble);
          saveMessages();
          scrollToBottom(true);
          renderHistoryList();
        } catch (error) {
          messages.pop();
          targetBubble.parentElement.remove();
          if (messages.length === 0) emptyState.style.display = 'flex';
          saveMessages();
          renderHistoryList();
          showToast('❌ ' + error.message, true);
        } finally {
          isStreaming = false;
          btnSend.classList.remove('loading');
          userInput.disabled = false;
          updateSendButton();
          userInput.focus();
          scrollToBottom(true);
        }
      }

      btnSend.addEventListener('click', sendMessage);
      userInput.addEventListener('input', () => {
        updateSendButton();
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
      });
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Toast
      let toastTimer;
      function showToast(msg, isError=false) {
        clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.className = 'toast ' + (isError ? 'error' : '');
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
      }

      // 快捷键关闭面板
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (historyVisible) closeHistory();
          if (dropdownVisible) closeDropdown();
        }
      });

      init();
      console.log('✅ AI对话已启动 | 骂人(快速) | 聊骚(快速) | 新对话按钮已激活');
    })();
  </script>
</body>
</html>
