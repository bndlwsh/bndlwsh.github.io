<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface2: #f0f0f3;
            --text: #1d1d1f;
            --text-secondary: #6e6e73;
            --border: #e0e0e5;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-light: #eff6ff;
            --user-bubble: #2563eb;
            --user-text: #ffffff;
            --ai-bubble: #ffffff;
            --ai-text: #1d1d1f;
            --ai-border: #e5e7eb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1c1c1e;
                --surface: #2c2c2e;
                --surface2: #3a3a3c;
                --text: #f5f5f7;
                --text-secondary: #a1a1a6;
                --border: #3a3a3c;
                --accent: #3b82f6;
                --accent-hover: #60a5fa;
                --accent-light: #1e293b;
                --user-bubble: #3b82f6;
                --user-text: #ffffff;
                --ai-bubble: #2c2c2e;
                --ai-text: #f5f5f7;
                --ai-border: #3a3a3c;
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
                --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ========== 顶部栏 ========== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 8px 16px;
            gap: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
            background: transparent;
            min-height: 44px;
        }

        .top-bar .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition);
            position: relative;
            flex-shrink: 0;
        }
        .top-bar .icon-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }
        .top-bar .icon-btn:active {
            transform: scale(0.93);
            background: var(--border);
        }
        .top-bar .icon-btn svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        .top-bar .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            border: 1.5px solid var(--bg);
            display: none;
        }
        .top-bar .badge.show {
            display: block;
        }

        /* ========== 设置面板 ========== */
        .settings-panel {
            position: absolute;
            top: 50px;
            right: 16px;
            width: 340px;
            max-width: calc(100vw - 32px);
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 20px 20px 16px;
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 14px;
            border: 1px solid var(--border);
            transform-origin: top right;
            animation: panelIn 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .settings-panel.visible {
            display: flex;
        }
        @keyframes panelIn {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(-8px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .settings-panel .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .settings-panel label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .settings-panel .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .settings-panel input[type="password"],
        .settings-panel input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 13px;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            transition: all var(--transition);
            outline: none;
            min-width: 0;
        }
        .settings-panel input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: var(--surface);
        }
        .settings-panel .toggle-vis {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all var(--transition);
            flex-shrink: 0;
            font-size: 14px;
        }
        .settings-panel .toggle-vis:hover {
            background: var(--surface);
            border-color: var(--text-secondary);
        }
        .settings-panel .btn-save {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.3px;
            align-self: flex-end;
        }
        .settings-panel .btn-save:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .settings-panel .btn-save:active {
            transform: scale(0.95);
        }
        .settings-panel .hint {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
            opacity: 0.8;
        }

        /* ========== 遮罩层 ========== */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 15;
            display: none;
            background: transparent;
        }
        .overlay.visible {
            display: block;
        }

        /* ========== 聊天区域 ========== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px 20px;
            pointer-events: none;
        }
        .empty-state .logo-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .empty-state .logo-icon svg {
            width: 28px;
            height: 28px;
        }
        .empty-state .subtitle {
            font-size: 13px;
            opacity: 0.7;
            max-width: 280px;
            line-height: 1.5;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: msgIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
            align-items: flex-start;
        }
        .message .bubble {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
            letter-spacing: 0.15px;
        }
        .message.user .bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 6px;
        }
        .message.assistant .bubble {
            background: var(--ai-bubble);
            color: var(--ai-text);
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 6px;
            box-shadow: var(--shadow-sm);
        }
        .message .model-tag {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding: 0 4px;
            letter-spacing: 0.3px;
            opacity: 0.7;
            font-weight: 500;
        }
        .message.user .model-tag {
            text-align: right;
        }

        /* 消息内的Markdown样式 */
        .bubble p {
            margin: 0 0 8px;
        }
        .bubble p:last-child {
            margin-bottom: 0;
        }
        .bubble strong {
            font-weight: 600;
        }
        .bubble em {
            font-style: italic;
        }
        .bubble code {
            background: rgba(0, 0, 0, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.88em;
            letter-spacing: 0;
        }
        .message.user .bubble code {
            background: rgba(255, 255, 255, 0.2);
        }
        .bubble pre {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 10px 0;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            position: relative;
            letter-spacing: 0;
        }
        .bubble pre code {
            background: none;
            padding: 0;
            font-size: inherit;
            color: inherit;
            letter-spacing: 0;
        }
        .bubble .code-block-wrapper {
            position: relative;
            margin: 10px 0;
        }
        .bubble .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #cdd6f4;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all var(--transition);
            z-index: 2;
            letter-spacing: 0.3px;
        }
        .bubble .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .bubble .copy-btn.copied {
            background: #22c55e;
            color: #fff;
        }
        .bubble ul,
        .bubble ol {
            margin: 6px 0;
            padding-left: 20px;
        }
        .bubble li {
            margin: 3px 0;
        }
        .bubble blockquote {
            border-left: 3px solid var(--accent);
            margin: 8px 0;
            padding: 4px 12px;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.03);
            border-radius: 0 6px 6px 0;
        }

        /* 加载动画 */
        .message.assistant .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
            align-items: center;
        }
        .message.assistant .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: bounce 1.2s infinite ease-in-out;
        }
        .message.assistant .typing-indicator span:nth-child(1) {
            animation-delay: 0s;
        }
        .message.assistant .typing-indicator span:nth-child(2) {
            animation-delay: 0.15s;
        }
        .message.assistant .typing-indicator span:nth-child(3) {
            animation-delay: 0.3s;
        }
        @keyframes bounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ========== 底部操作栏 ========== */
        .bottom-bar {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 12px 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 5;
        }

        /* 模型切换按钮 - 左下 */
        .model-switch-wrapper {
            position: relative;
            flex-shrink: 0;
        }
        .btn-model-switch {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
            min-height: 44px;
        }
        .btn-model-switch:hover {
            background: var(--surface);
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .btn-model-switch:active {
            transform: scale(0.96);
        }
        .btn-model-switch .provider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .btn-model-switch .provider-dot.qwen {
            background: #6366f1;
        }
        .btn-model-switch .provider-dot.zhipu {
            background: #10b981;
        }
        .btn-model-switch .chevron {
            width: 14px;
            height: 14px;
            transition: transform var(--transition);
            color: var(--text-secondary);
        }
        .btn-model-switch .chevron.open {
            transform: rotate(180deg);
        }

        /* 模型下拉菜单 */
        .model-dropdown {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            min-width: 220px;
            display: none;
            flex-direction: column;
            z-index: 30;
            overflow: hidden;
            animation: dropdownIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom left;
        }
        .model-dropdown.visible {
            display: flex;
        }
        @keyframes dropdownIn {
            from {
                opacity: 0;
                transform: translateY(6px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .model-dropdown .dropdown-header {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 14px 6px;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .model-dropdown .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            letter-spacing: 0.2px;
        }
        .model-dropdown .dropdown-item:hover {
            background: var(--accent-light);
        }
        .model-dropdown .dropdown-item.active {
            background: var(--accent-light);
            font-weight: 600;
            color: var(--accent);
        }
        .model-dropdown .dropdown-item .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .model-dropdown .dropdown-item .dot.qwen {
            background: #6366f1;
        }
        .model-dropdown .dropdown-item .dot.zhipu {
            background: #10b981;
        }
        .model-dropdown .divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* 输入框 - 中下 */
        .input-wrapper {
            flex: 1;
            position: relative;
            min-width: 0;
        }
        .input-wrapper textarea {
            width: 100%;
            padding: 11px 16px;
            border-radius: 25px;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: all var(--transition);
            line-height: 1.4;
            max-height: 140px;
            min-height: 44px;
            letter-spacing: 0.2px;
            -webkit-appearance: none;
        }
        .input-wrapper textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
            background: var(--surface);
        }
        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* 发送按钮 - 右下 */
        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-send:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }
        .btn-send:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }
        .btn-send:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .btn-send svg {
            width: 18px;
            height: 18px;
            pointer-events: none;
            margin-left: 2px;
        }
        .btn-send .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-send.loading .spinner {
            display: block;
        }
        .btn-send.loading .send-icon {
            display: none;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1d1d1f;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 500;
            z-index: 100;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
            box-shadow: var(--shadow-lg);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            background: #ef4444;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 600px) {
            .bottom-bar {
                gap: 6px;
                padding: 10px 10px;
                padding-bottom: max(14px, env(safe-area-inset-bottom, 14px));
            }
            .btn-model-switch {
                padding: 10px 11px;
                font-size: 11px;
                gap: 4px;
                min-height: 40px;
            }
            .btn-model-switch .model-name-short {
                display: inline;
            }
            .btn-model-switch .model-name-full {
                display: none;
            }
            .input-wrapper textarea {
                padding: 10px 14px;
                font-size: 14px;
                min-height: 40px;
                border-radius: 22px;
            }
            .btn-send {
                width: 40px;
                height: 40px;
                min-width: 40px;
            }
            .btn-send svg {
                width: 16px;
                height: 16px;
            }
            .chat-container {
                padding: 6px 10px 14px;
                gap: 6px;
            }
            .message {
                max-width: 92%;
            }
            .message .bubble {
                padding: 10px 14px;
                font-size: 14px;
            }
            .settings-panel {
                width: calc(100vw - 20px);
                right: 10px;
                top: 48px;
                padding: 16px;
                gap: 10px;
            }
            .top-bar {
                padding: 6px 10px;
                min-height: 38px;
            }
        }
        @media (min-width: 601px) {
            .btn-model-switch .model-name-short {
                display: none;
            }
            .btn-model-switch .model-name-full {
                display: inline;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部栏 ==================== -->
    <div class="top-bar" id="topBar">
        <!-- 清除对话按钮 -->
        <button class="icon-btn" id="btnClearChat" title="清除对话">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>

                    <span class="dot qwen"></span> qwen-max
                </div>
                <div class="dropdown-item" data-provider="qwen" data-model="qwen-turbo" data-display="通义千问 Turbo" data-short="Qwen T">
                    <span class="dot qwen"></span> qwen-turbo
                </div>
                <div class="dropdown-item" data-provider="qwen" data-model="qwen-long" data-display="通义千问 Long" data-short="Qwen L">
                    <span class="dot qwen"></span> qwen-long
                </div>
                <div class="divider"></div>
                <div class="dropdown-header">智谱 AI</div>
                <div class="dropdown-item" data-provider="zhipu" data-model="glm-4" data-display="智谱 GLM-4" data-short="GLM-4">
                    <span class="dot zhipu"></span> glm-4
                </div>
                <div class="dropdown-item" data-provider="zhipu" data-model="glm-4-flash" data-display="智谱 GLM-4 Flash" data-short="GLM-4F">
                    <span class="dot zhipu"></span> glm-4-flash
                </div>
                <div class="dropdown-item" data-provider="zhipu" data-model="glm-4-air" data-display="智谱 GLM-4 Air" data-short="GLM-4A">
                    <span class="dot zhipu"></span> glm-4-air

        <!-- 输入框 - 中下 -->

            id="userInput"

        <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>

        <div class="spinner"></div>

<!-- ==================== Toast ==================== -->
<div class="toast" id="toast"></div>

<script>
    (function() {
        // ==================== DOM 元素 ====================
        const chatContainer = document.getElementById('chatContainer');
        const emptyState = document.getElementById('emptyState');
        const userInput = document.getElementById('userInput');
        const btnSend = document.getElementById('btnSend');
        const btnModelSwitch = document.getElementById('btnModelSwitch');
        const modelDropdown = document.getElementById('modelDropdown');
        const modelSwitchWrapper = document.getElementById('modelSwitchWrapper');
        const chevronIcon = document.getElementById('chevronIcon');
        const providerDot = document.getElementById('providerDot');
        const modelNameFull = document.getElementById('modelNameFull');
        const modelNameShort = document.getElementById('modelNameShort');
        const settingsPanel = document.getElementById('settingsPanel');
        const btnSettings = document.getElementById('btnSettings');
        const btnSaveKeys = document.getElementById('btnSaveKeys');
        const overlay = document.getElementById('overlay');
        const settingsBadge = document.getElementById('settingsBadge');
        const apiKeyQwen = document.getElementById('apiKeyQwen');
        const apiKeyZhipu = document.getElementById('apiKeyZhipu');
        const btnClearChat = document.getElementById('btnClearChat');
        const toast = document.getElementById('toast');

        // ==================== 状态 ====================
        const STORAGE_KEY_CHAT = 'ai_chat_messages';
        const STORAGE_KEY_KEYS = 'ai_chat_api_keys';
        const STORAGE_KEY_MODEL = 'ai_chat_current_model';

        let messages = []; // { role: 'user'|'assistant', content: string, model?: string }
        let apiKeys = { qwen: '', zhipu: '' };
        let currentProvider = 'qwen';
        let currentModel = 'qwen-plus';
        let currentModelDisplay = '通义千问 Plus';
        let currentModelShort = 'Qwen+';
        let isStreaming = false;
        let settingsVisible = false;
        let dropdownVisible = false;

        // ==================== 初始化 ====================
        function init() {
            loadApiKeys();
            loadCurrentModel();
            loadMessages();
            updateSettingsBadge();
            updateModelButtonUI();
            updateEmptyState();
            updateSendButton();
            // 恢复滚动位置
            requestAnimationFrame(() => {
                scrollToBottom(false);
            });
        }

        function loadApiKeys() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_KEYS);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    apiKeys.qwen = parsed.qwen || '';
                    apiKeys.zhipu = parsed.zhipu || '';
                }
            } catch (e) {
                apiKeys = { qwen: '', zhipu: '' };
            }
            apiKeyQwen.value = apiKeys.qwen;
            apiKeyZhipu.value = apiKeys.zhipu;
        }

        function saveApiKeys() {
            apiKeys.qwen = apiKeyQwen.value.trim();
            apiKeys.zhipu = apiKeyZhipu.value.trim();
            try {
                localStorage.setItem(STORAGE_KEY_KEYS, JSON.stringify(apiKeys));
            } catch (e) {
                showToast('存储空间不足，请清理浏览器缓存', true);
            }
            updateSettingsBadge();
        }

        function loadCurrentModel() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_MODEL);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    currentProvider = parsed.provider || 'qwen';
                    currentModel = parsed.model || 'qwen-plus';
                    currentModelDisplay = parsed.display || '通义千问 Plus';
                    currentModelShort = parsed.short || 'Qwen+';
                }
            } catch (e) {
                currentProvider = 'qwen';
                currentModel = 'qwen-plus';
                currentModelDisplay = '通义千问 Plus';
                currentModelShort = 'Qwen+';
            }
        }

        function saveCurrentModel() {
            try {
                localStorage.setItem(STORAGE_KEY_MODEL, JSON.stringify({
                    provider: currentProvider,
                    model: currentModel,
                    display: currentModelDisplay,
                    short: currentModelShort,
                }));
            } catch (e) {
                // 静默处理
            }
        }

        function loadMessages() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_CHAT);
                if (saved) {
                    messages = JSON.parse(saved);
                    if (!Array.isArray(messages)) messages = [];
                    // 限制消息数量
                    if (messages.length > 60) {
                        messages = messages.slice(-60);
                    }
                }
            } catch (e) {
                messages = [];
            }
            renderAllMessages();
        }

        function saveMessages() {
            try {
                // 限制存储的消息数量
                const toSave = messages.length > 50 ? messages.slice(-50) : messages;
                localStorage.setItem(STORAGE_KEY_CHAT, JSON.stringify(toSave));
            } catch (e) {
                showToast('对话历史过长，已自动清理部分记录', true);
                const trimmed = messages.slice(-30);
                messages = trimmed;
                try {
                    localStorage.setItem(STORAGE_KEY_CHAT, JSON.stringify(trimmed));
                } catch (e2) {
                    // 最终失败则清空存储
                    localStorage.removeItem(STORAGE_KEY_CHAT);
                }
                renderAllMessages();
            }
        }

        function updateSettingsBadge() {
            const hasQwen = !!apiKeys.qwen;
            const hasZhipu = !!apiKeys.zhipu;
            if (!hasQwen && !hasZhipu) {
                settingsBadge.classList.add('show');
            } else if (!hasQwen || !hasZhipu) {
                settingsBadge.classList.add('show');
            } else {
                settingsBadge.classList.remove('show');
            }
        }

        function updateModelButtonUI() {
            providerDot.className = 'provider-dot ' + (currentProvider === 'qwen' ? 'qwen' : 'zhipu');
            modelNameFull.textContent = currentModelDisplay;
            modelNameShort.textContent = currentModelShort;
        }

        function updateEmptyState() {
            if (messages.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
            }
        }

        function updateSendButton() {
            const text = userInput.value.trim();
            if (text && !isStreaming) {
                btnSend.disabled = false;
            } else if (isStreaming) {
                btnSend.disabled = true;
            } else {
                btnSend.disabled = true;
            }
        }

        // ==================== 渲染消息 ====================
        function renderAllMessages() {
            // 清除现有消息（保留 emptyState）
            const existingMessages = chatContainer.querySelectorAll('.message');
            existingMessages.forEach(el => el.remove());
            updateEmptyState();

            messages.forEach((msg, index) => {
                appendMessageElement(msg, index === messages.length - 1 && msg.role === 'assistant');
            });
            if (messages.length > 0) {
                requestAnimationFrame(() => scrollToBottom(false));
            }
        }

        function appendMessageElement(msg, isLastAssistant = false) {
            const div = document.createElement('div');
            div.className = 'message ' + msg.role;

            if (msg.role === 'assistant' && msg.model) {
                const tag = document.createElement('div');
                tag.className = 'model-tag';
                tag.textContent = msg.model;
                div.appendChild(tag);
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = renderMarkdown(msg.content);
            div.appendChild(bubble);

            // 为代码块添加复制按钮
            const codeWrappers = bubble.querySelectorAll('.code-block-wrapper');
            codeWrappers.forEach(wrapper => {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                copyBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const pre = wrapper.querySelector('pre');
                    const code = pre ? pre.textContent : '';
                    navigator.clipboard.writeText(code).then(() => {
                        copyBtn.textContent = '✓ 已复制';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    }).catch(() => {
                        // 降级方案
                        const textarea = document.createElement('textarea');
                        textarea.value = code;
                        textarea.style.position = 'fixed';
                        textarea.style.opacity = '0';
                        document.body.appendChild(textarea);
                        textarea.select();
                        try { document.execCommand('copy'); } catch (e) {}
                        document.body.removeChild(textarea);
                        copyBtn.textContent = '✓ 已复制';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.textContent = '复制';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                });
                wrapper.appendChild(copyBtn);
            });

            chatContainer.appendChild(div);
            updateEmptyState();
        }

        function renderMarkdown(content) {
            if (!content) return '';
            let html = content;

            // 转义HTML（保护已处理的标签）
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // 还原代码块（在转义后处理）
            // 匹配 ```language\ncode\n```
            html = html.replace(/&lt;```(\w*)\n([\s\S]*?)```&gt;/g, function(match, lang, code) {
                // 还原code中的转义
                code = code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
                return '<div class="code-block-wrapper"><pre><code>' + code + '</code></pre></div>';
            });

            // 匹配 ```code```（无语言指定，单行）
            html = html.replace(/&lt;```([\s\S]*?)```&gt;/g, function(match, code) {
                code = code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
                return '<div class="code-block-wrapper"><pre><code>' + code + '</code></pre></div>';
            });

            // 行内代码 `code`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 粗体 **text**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 斜体 *text*
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 块引用 > text
            html = html.replace(/^&gt;\s?(.*)$/gm, '<blockquote>$1</blockquote>');

            // 无序列表 - item 或 * item
            html = html.replace(/^[*-]\s+(.*)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // 换行
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');

            // 包裹段落
            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }

            // 清理空段落
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p><br><\/p>/g, '');

            return html;
        }

        function scrollToBottom(smooth = true) {
            if (smooth) {
                chatContainer.scrollTo({
                    top: chatContainer.scrollHeight,
                    behavior: 'smooth',
                });
            } else {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // ==================== API 调用 ====================
        function getApiConfig() {
            if (currentProvider === 'qwen') {
                return {
                    url: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
                    apiKey: sk-d8a36fba6e66438fb5428382d4c563dc,
                    model: currentModel,
                    providerName: '通义千问',
                };
            } else {
                return {
                    url: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
                    apiKey: 4361b676e870492bb24ac29059ac692e.RBHOHTX6OUaIf0tM,
                    model: currentModel,
                    providerName: '智谱AI',
                };
            }
        }

        async function sendMessage() {
            if (isStreaming) return;

            const userText = userInput.value.trim();
            if (!userText) return;

            const config = getApiConfig();
            if (!config.apiKey) {
                const providerLabel = currentProvider === 'qwen' ? '通义千问' : '智谱AI';
                showToast('⚠️ 请先设置 ' + providerLabel + ' 的 API 密钥', true);
                openSettings();
                return;
            }

            // 添加用户消息
            const userMsg = { role: 'user', content: userText };
            messages.push(userMsg);
            appendMessageElement(userMsg);
            updateEmptyState();
            saveMessages();

            // 清空输入框
            userInput.value = '';
            userInput.style.height = 'auto';
            updateSendButton();
            scrollToBottom(true);

            // 添加AI消息占位
            const aiMsg = {
                role: 'assistant',
                content: '',
                model: config.model,
            };
            messages.push(aiMsg);
            appendMessageElement(aiMsg, true);
            updateEmptyState();
            scrollToBottom(true);

            // 获取最后一个bubble用于更新
            const allBubbles = chatContainer.querySelectorAll('.message.assistant .bubble');
            const targetBubble = allBubbles[allBubbles.length - 1];

            // 显示加载动画
            targetBubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            scrollToBottom(true);

            // 设置加载状态
            isStreaming = true;
            btnSend.classList.add('loading');
            btnSend.disabled = true;
            userInput.disabled = true;

            // 构建请求消息（最近40条，确保不超过上下文）
            const contextMessages = messages.slice(0, -1).slice(-40).map(m => ({
                role: m.role,
                content: m.content,
            }));

            // 添加system prompt
            const fullMessages = [{
                    role: 'system',
                    content: '你是一个智能助手，请用中文回答用户的问题。回答要准确、详细、有帮助。如果是代码相关的问题，请使用Markdown格式展示代码。',
                },
                ...contextMessages,
            ];

            try {
                const response = await fetch(config.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + config.apiKey,
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: fullMessages,
                        stream: false,
                        max_tokens: 4096,
                        temperature: 0.7,
                    }),
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    let errorMsg = '请求失败: ' + response.status;
                    if (response.status === 401) {
                        errorMsg = 'API 密钥无效或未授权，请检查密钥是否正确';
                    } else if (response.status === 429) {
                        errorMsg = '请求频率过高，请稍后再试';
                    } else if (response.status === 500) {
                        errorMsg = '服务器内部错误，请稍后再试';
                    } else if (errorData.error && errorData.error.message) {
                        errorMsg = errorData.error.message;
                    }
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                let replyContent = '';

                if (data.choices && data.choices.length > 0 && data.choices[0].message) {
                    replyContent = data.choices[0].message.content || '';
                } else {
                    throw new Error('API 返回格式异常');
                }

                // 更新AI消息
                aiMsg.content = replyContent;
                messages[messages.length - 1] = aiMsg;
                targetBubble.innerHTML = renderMarkdown(replyContent);

                // 为代码块添加复制按钮
                const codeWrappers = targetBubble.querySelectorAll('.code-block-wrapper');
                codeWrappers.forEach(wrapper => {
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = '复制';
                    copyBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const pre = wrapper.querySelector('pre');
                        const code = pre ? pre.textContent : '';
                        navigator.clipboard.writeText(code).then(() => {
                            copyBtn.textContent = '✓ 已复制';
                            copyBtn.classList.add('copied');
                            setTimeout(() => {
                                copyBtn.textContent = '复制';
                                copyBtn.classList.remove('copied');
                            }, 2000);
                        }).catch(() => {
                            const textarea = document.createElement('textarea');
                            textarea.value = code;
                            textarea.style.position = 'fixed';
                            textarea.style.opacity = '0';
                            document.body.appendChild(textarea);
                            textarea.select();
                            try { document.execCommand('copy'); } catch (e) {}
                            document.body.removeChild(textarea);
                            copyBtn.textContent = '✓ 已复制';
                            copyBtn.classList.add('copied');
                            setTimeout(() => {
                                copyBtn.textContent = '复制';
                                copyBtn.classList.remove('copied');
                            }, 2000);
                        });
                    });
                    wrapper.appendChild(copyBtn);
                });

                saveMessages();
                scrollToBottom(true);

            } catch (error) {
                // 移除失败的AI消息
                messages.pop();
                const failedMsgEl = chatContainer.querySelectorAll('.message.assistant');
                if (failedMsgEl.length > 0) {
                    const lastFailed = failedMsgEl[failedMsgEl.length - 1];
                    // 检查是否是刚添加的空消息
                    const bubble = lastFailed.querySelector('.bubble');
                    if (bubble && (bubble.querySelector('.typing-indicator') || bubble.textContent.trim() ===
                            '')) {
                        lastFailed.remove();
                    }
                }
                updateEmptyState();
                saveMessages();
                showToast('❌ ' + error.message, true);
                console.error('API Error:', error);
            } finally {
                isStreaming = false;
                btnSend.classList.remove('loading');
                userInput.disabled = false;
                updateSendButton();
                userInput.focus();
                scrollToBottom(true);
            }
        }

        // ==================== Toast ====================
        let toastTimer;

        function showToast(msg, isError = false) {
            clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.className = 'toast ' + (isError ? 'error' : '');
            // 强制回流
            toast.offsetHeight;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        // ==================== 设置面板 ====================
        function openSettings() {
            settingsVisible = true;
            settingsPanel.classList.add('visible');
            overlay.classList.add('visible');
            apiKeyQwen.value = apiKeys.qwen;
            apiKeyZhipu.value = apiKeys.zhipu;
        }

        function closeSettings() {
            settingsVisible = false;
            settingsPanel.classList.remove('visible');
            overlay.classList.remove('visible');
            // 恢复原始值
            apiKeyQwen.value = apiKeys.qwen;
            apiKeyZhipu.value = apiKeys.zhipu;
        }

        function toggleSettings() {
            if (settingsVisible) {
                closeSettings();
            } else {
                openSettings();
            }
        }

        btnSettings.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSettings();
        });

        btnSaveKeys.addEventListener('click', () => {
            saveApiKeys();
            closeSettings();
            showToast('✅ API 密钥已保存');
        });

        overlay.addEventListener('click', () => {
            if (settingsVisible) closeSettings();
            if (dropdownVisible) closeDropdown();
        });

        // 切换密码可见性
        settingsPanel.addEventListener('click', (e) => {
            const toggleBtn = e.target.closest('.toggle-vis');
            if (toggleBtn) {
                const targetId = toggleBtn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    if (input.type === 'password') {
                        input.type = 'text';
                        toggleBtn.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        toggleBtn.textContent = '👁️';
                    }
                }
            }
        });

        // 点击设置面板外部关闭（通过overlay处理）
        document.addEventListener('click', (e) => {
            if (settingsVisible && !settingsPanel.contains(e.target) && e.target !== btnSettings && !btnSettings
                .contains(e.target)) {
                closeSettings();
            }
            if (dropdownVisible && !modelSwitchWrapper.contains(e.target)) {
                closeDropdown();
            }
        });

        // ==================== 模型下拉菜单 ====================
        function openDropdown() {
            dropdownVisible = true;
            modelDropdown.classList.add('visible');
            chevronIcon.classList.add('open');
            // 高亮当前选中项
            const items = modelDropdown.querySelectorAll('.dropdown-item');
            items.forEach(item => {
                if (item.getAttribute('data-model') === currentModel && item.getAttribute('data-provider') ===
                    currentProvider) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function closeDropdown() {
            dropdownVisible = false;
            modelDropdown.classList.remove('visible');
            chevronIcon.classList.remove('open');
        }

        function toggleDropdown() {
            if (dropdownVisible) {
                closeDropdown();
            } else {
                openDropdown();
            }
        }

        btnModelSwitch.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown();
        });

        modelDropdown.addEventListener('click', (e) => {
            const item = e.target.closest('.dropdown-item');
            if (item) {
                const provider = item.getAttribute('data-provider');
                const model = item.getAttribute('data-model');
                const display = item.getAttribute('data-display');
                const short = item.getAttribute('data-short');

                currentProvider = provider;
                currentModel = model;
                currentModelDisplay = display;
                currentModelShort = short;

                updateModelButtonUI();
                saveCurrentModel();
                closeDropdown();

                // 检查对应API密钥
                const config = getApiConfig();
                if (!config.apiKey) {
                    const providerLabel = currentProvider === 'qwen' ? '通义千问' : '智谱AI';
                    showToast('⚠️ 请设置 ' + providerLabel + ' 的 API 密钥', true);
                    setTimeout(openSettings, 500);
                } else {
                    showToast('✅ 已切换到 ' + display);
                }
            }
        });

        // ==================== 清除对话 ====================
        btnClearChat.addEventListener('click', () => {
            if (messages.length === 0) return;
            if (confirm('确定要清除所有对话记录吗？此操作不可撤销。')) {
                messages = [];
                const existingMessages = chatContainer.querySelectorAll('.message');
                existingMessages.forEach(el => el.remove());
                updateEmptyState();
                saveMessages();
                showToast('🗑️ 对话已清除');
                userInput.focus();
            }
        });

        // ==================== 发送按钮 ====================
        btnSend.addEventListener('click', () => {
            if (!isStreaming && userInput.value.trim()) {
                sendMessage();
            }
        });

        // ==================== 输入框事件 ====================
        userInput.addEventListener('input', () => {
            updateSendButton();
            // 自动调整高度
            userInput.style.height = 'auto';
            const newHeight = Math.min(userInput.scrollHeight, 140);
            userInput.style.height = newHeight + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isStreaming && userInput.value.trim()) {
                    sendMessage();
                }
            }
            // Shift+Enter 换行（默认行为）
        });

        // ==================== 快捷键 ====================
        document.addEventListener('keydown', (e) => {
            // Ctrl+/ 或 Cmd+/ 打开设置
            if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                e.preventDefault();
                toggleSettings();
            }
            // Escape 关闭面板
            if (e.key === 'Escape') {
                if (dropdownVisible) closeDropdown();
                if (settingsVisible) closeSettings();
            }
        });

        // ==================== 窗口大小调整 ====================
        window.addEventListener('resize', () => {
            userInput.style.height = 'auto';
            const newHeight = Math.min(userInput.scrollHeight, 140);
            userInput.style.height = newHeight + 'px';
        });

        // ==================== 初始化 ====================
        init();
        userInput.focus();

        // ==================== 定期清理旧消息（防止localStorage溢出） ====================
        setInterval(() => {
            if (messages.length > 45) {
                const trimmed = messages.slice(-40);
                if (trimmed.length < messages.length) {
                    messages = trimmed;
                    saveMessages();
                    renderAllMessages();
                }
            }
        }, 60000); // 每分钟检查一次

        console.log('✅ AI 对话界面已就绪');
        console.log('   💡 点击右上角齿轮图标设置 API 密钥');
        console.log('   ⌨️  快捷键: Enter 发送, Shift+Enter 换行, Ctrl+/ 打开设置');
        console.log('   📦 支持模型: 通义千问 (qwen-plus/max/turbo/long) | 智谱AI (glm-4/flash/air)');
    })();
</script>
</body>
</html>
